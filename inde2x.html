<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Document</title>
    <link rel="stylesheet" href="assets/css/menu.css">

<body>
    <div class="game-screen">
        <label for="">Number of Players</label>
        <div class="numberOfPlayers">
            <button btn-minus class="minus">-</button>
            <input txt-numOfPlayers type="text" class="txtNumOfPlayers" value="2">
            <button btn-plus class="plus">+</button>
        </div>
        <div id="gameMenu" class="game-menu">
            <button btn-newgame="create" class="btn-newgame">Create New Game</button>
        </div>
        <form class="list-of-players" id="listOfPlayers" action="gameConfig" method="post">
            
        </form>
    </div>

    <script src="assets/js/player.js"></script>
</body>
