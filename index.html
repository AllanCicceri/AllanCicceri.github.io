<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/estilos.css">
</head>

<body>
    <div class="espaco">
        <div class="mesa-config" id="mesaConfig">
            <span class="btnNumPlayersDiv">
                <label for="numberOfPlayers" class="lblNumOfPlayers">Players (min:2 max:8)</label>
                <div class="inputNumOfPlayers">
                    <input type="number" max="8" min="2" class="numer-of-players" id="numberOfPlayers">
                </div>
            </span>

            <span class="TimeElement">
                <label for="timeInSeconds" class="lblTime">Time in seconds(max 999)</label>
                <div class="inputTimeDiv">
                    <input type="number" max="999" min="0" class="time-seconds" id="timeInSeconds">
                </div>
            </span>

            <button class="ready btn-player" id="ready">We're Ready!</button>
        </div>
        <div class="mesa-flex">
            <div class="mesa" id="mesa">
                <div class="mesa-cima" id="mesa-cima"></div>
                
                <div class="mesa-centro">
                    <button class="botao" btn-passar>Passar</button>
                    <div id="timer" class="timer">Start Game</div>
                    <button class="botao" btn-desistir>Desistir</button>
                </div>
                
                <div class="mesa-baixo" id="mesa-baixo"></div>
            </div>
        </div>
    </div>
    </div>

    <script src="assets/js/gameScreen.js"></script>
    <script src="assets/js/cssController.js"></script>
    <script src="assets/js/gameController.js"></script>
    <script src="assets/js/Player.js"></script>
</body>

</html>
